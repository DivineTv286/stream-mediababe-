<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stream Africa | Review Information</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin:0; padding:0; font-family:'Poppins',sans-serif;}
    body { 
      background: radial-gradient(circle at top,#041412,#000); 
      color:#fff; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      padding:20px; 
      min-height:100vh;
    }

    .header{
      text-align:center; 
      margin-bottom:30px;
    }

    .page-title{
      font-size:28px; 
      font-weight:900; 
      text-transform:uppercase; 
      color:#4fd1c5;
    }

    .sub-text{
      color:#9fcfc6; 
      font-size:14px; 
      max-width:280px; 
      margin:0 auto; 
      line-height:1.5;
    }

    .confirm-card{
      background:rgba(10,40,38,0.75);
      backdrop-filter:blur(10px);
      width:100%; 
      max-width:400px; 
      padding:30px; 
      border-radius:25px; 
      border:1px solid rgba(79,209,197,0.2); 
      box-shadow:0 10px 40px rgba(0,0,0,0.6); 
      margin-bottom:25px;
      display:flex;
      flex-direction: column;
      gap:20px;
    }

    .info-row{
      display:flex; 
      justify-content:space-between; 
      font-size:14px; 
      border-bottom:1px solid rgba(255,255,255,0.05); 
      padding-bottom:12px;
    }

    .info-row:last-child{
      border-bottom:none;
    }

    .label{ color:#9fcfc6; }
    .value{ font-weight:700; color:#fff; text-align:right; }
    .highlight{ color:#4fd1c5 !important; }

    .total-box{
      display:flex; 
      justify-content:space-between; 
      align-items:center;
      margin-top:10px;
      font-size:18px;
    }

    .total-text{ font-size:24px; font-weight:900; color:#4fd1c5; }

    .btn-pay{
      width:100%; 
      background:linear-gradient(90deg,#4fd1c5,#2fb8a6); 
      color:#000; 
      border:none; 
      padding:20px; 
      border-radius:15px; 
      font-weight:900; 
      font-size:18px; 
      text-transform:uppercase; 
      cursor:pointer; 
      box-shadow:0 5px 25px rgba(79,209,197,0.3); 
      text-align:center; 
      text-decoration:none; 
      display:block;
    }

    .btn-edit{
      color:#444; 
      text-decoration:underline; 
      font-size:14px; 
      background:none; 
      border:none; 
      cursor:pointer; 
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2 class="page-title">CONFIRM DETAILS</h2>
    <p class="sub-text">Almost there! Review your details before activating your Stream account.</p>
  </div>

  <div class="confirm-card">
    <div class="info-row"><span class="label">Name:</span><span class="value" id="res-name">...</span></div>
    <div class="info-row"><span class="label">Username:</span><span class="value" id="res-user">...</span></div>
    <div class="info-row"><span class="label">Email:</span><span class="value" id="res-email">...</span></div>
    <div class="info-row"><span class="label">Phone:</span><span class="value" id="res-phone">...</span></div>
    <div class="info-row"><span class="label">Plan / Fee:</span><span class="value highlight" id="res-plan">...</span></div>

    <div class="total-box">
      <span class="total-text">Total Due:</span>
      <span class="total-text" id="res-total">...</span>
    </div>

    <a href="payment.html" id="pay-link" class="btn-pay">PAY ... NOW</a>
    <button class="btn-edit" onclick="history.back()">Back to Edit</button>
  </div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const fullname = urlParams.get('fullname') || 'User';
  const username = urlParams.get('username') || 'user';
  const email = urlParams.get('email') || 'N/A';
  const phone = urlParams.get('phone') || 'N/A';
  const plan = urlParams.get('plan') || 'Nigeria – NGN 12,000';

  document.getElementById('res-name').innerText = fullname;
  document.getElementById('res-user').innerText = '@'+username;
  document.getElementById('res-email').innerText = email;
  document.getElementById('res-phone').innerText = phone;
  document.getElementById('res-plan').innerText = plan;

  const totalDue = plan.split('–')[1]?.trim() || 'NGN 12,000';
  document.getElementById('res-total').innerText = totalDue;

  const payLink = document.getElementById('pay-link');
  payLink.innerText = `PAY ${totalDue} NOW`;
</script>
</body>
</html>
